name: tinyctx

services:
  agent:
    build:
      context: .
    image: tinyctx:latest
    container_name: tinyctx

    restart: unless-stopped

    # ── ports ──────────────────────────────────────────────────────────────
    # Only bind gateway to localhost — don't expose it to the LAN
    ports:
      - "127.0.0.1:8085:8085"

    # ── volumes ────────────────────────────────────────────────────────────
    volumes:
      # Workspace: read-write so the agent can persist memory/sessions.
      # Override with TINYCTX_WORKSPACE env var or a .env file.
      # Default is ~/.tinyctx on the host, created automatically if absent.
      - type: bind
        source: ${TINYCTX_WORKSPACE:-~/.tinyctx}
        target: /workspace

      # Config: the repo ships example.config.yaml — copy it to config.yaml,
      # fill in your model URLs/keys, and it will be picked up here.
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true

    # ── environment ────────────────────────────────────────────────────────
    environment:
      # Redirect workspace to the container-internal mount point.
      # Overrides whatever Windows path config.yaml has.
      TINYCTX_WORKSPACE_OVERRIDE: /workspace
      # Make the gateway bind to 0.0.0.0 so Docker port forwarding works.
      # Without this, host: 127.0.0.1 in config.yaml would be unreachable.
      TINYCTX_GATEWAY_HOST: "0.0.0.0"

    # ── security hardening ─────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true   # can't escalate via setuid binaries

    # Drop ALL linux capabilities, add back only the minimum.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # harmless — gateway port is 8080, not <1024

    # Read-only root filesystem — container code can't be modified at runtime.
    # tmpfs mounts provide writable scratch space for caches etc.
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /app/__pycache__:size=64m
      - /home/tinyctx:size=64m    # playwright browser profile lands here

    # ── resource limits ────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 512M

    # ── network ────────────────────────────────────────────────────────────
    # Bridge mode. Container gets internet + can reach Tailscale IPs
    # (100.64.72.3) because Docker bridge traffic routes through the host.
    networks:
      - tinyctx_net

    # ── healthcheck ────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  tinyctx_net:
    driver: bridge
    driver_opts:
      # Named bridge so it doesn't share a network with your Matrix stack etc.
      com.docker.network.bridge.name: br_tinyctx
