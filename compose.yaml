name: tinyctx

services:

  # ── agent ──────────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: tinyctx:latest
    container_name: tinyctx
    depends_on:
      shell_sandbox:
        condition: service_healthy
    restart: unless-stopped

    ports:
      - "127.0.0.1:8085:8085"

    volumes:
      - type: bind
        source: ${TINYCTX_WORKSPACE:-~/.tinyctx}
        target: /home/tinyctx
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true
      - type: bind
        source: ./TinyCTX
        target: /app/TinyCTX
        read_only: true

    environment:
      TINYCTX_GATEWAY_HOST: "0.0.0.0"
      DISCORD_BOT_TOKEN:
      MATRIX_PASSWORD:

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /app/__pycache__:size=64m

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 512M

    networks:
      tinyctx_net: {}     # internet + Tailscale
      agent_sandbox: {}   # IPC to sandbox only

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── shell_sandbox ──────────────────────────────────────────────────────────
  # Executes shell commands forwarded by the agent's shell module.
  #
  # Access control is entirely network-based:
  #   agent_sandbox (internal: true)
  #     — the only network the agent and sandbox share
  #     — internal: true means Docker adds no gateway, zero egress
  #     — nothing outside this stack can reach port 8700
  #   sandbox_egress
  #     — gives the sandbox internet for curl, git, npm, pip, etc.
  #     — firewall-init blocks LAN / Tailscale ranges on this bridge
  #
  # The agent is NOT on sandbox_egress, so it cannot be reached from there.
  # The sandbox is NOT on tinyctx_net, so it cannot reach the agent's
  # gateway or Tailscale services.
  shell_sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: tinyctx-sandbox:latest
    container_name: tinyctx_sandbox
    restart: unless-stopped

    expose:
      - "8700"   # no host binding — only agent_sandbox peers can reach this

    volumes:
      - type: bind
        source: ${TINYCTX_WORKSPACE:-~/.tinyctx}
        target: /home/tinyctx

    environment:
      SANDBOX_PORT: "8700"
      WORKSPACE_PATH: "/home/tinyctx"

    security_opt:
      - no-new-privileges:false   # must be false so entrypoint can setuid/setgid after iptables
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN    # iptables rules in entrypoint.sh
      - SETUID       # drop to tinyctx user after firewall setup
      - SETGID       # drop to tinyctx group after firewall setup
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 256M

    networks:
      agent_sandbox: {}   # IPC from agent
      sandbox_egress: {}  # internet out (LAN/TS blocked by sandbox at startup)

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8700/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s


# ── networks ────────────────────────────────────────────────────────────────

networks:
  # Agent's primary network — Tailscale reachable via host routing.
  tinyctx_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_tinyctx

  # IPC-only channel between agent and sandbox.
  # internal: true = Docker adds no gateway = zero internet egress on this net.
  # The only two containers on this network are the agent and the sandbox.
  agent_sandbox:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: br_agentsbox

  # Sandbox internet egress. Has a gateway; LAN/TS ranges blocked by firewall-init.
  sandbox_egress:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_sandboxout
